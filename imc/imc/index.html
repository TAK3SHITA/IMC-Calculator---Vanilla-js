<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC Calculator</title>
    <!--favicon-->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <!--CSS-->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <div class="formulario">
        <h2>Dados do Paciente</h2>
        <form id="formIMC" onsubmit="processaCalculo(event)">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="EX: Braia da Silva"
            minlength="3" maxlength="100"
            title="Informe o seu nome Completo"
            required>

            <label for="nascimento">Data de Nascimento</label>
            <input type="date" id="nascimento">

            <label for="peso">Seu peso</label>
            <input type="number" id="peso" step="0.1" min="0" max="350"
            placeholder="EX: 70.5" title="Informe seu peso em KG"
            required>
        
            <label for="altura">Sua altura</label>
            <input type="number" id="altura" step="0.01" min="0" max="2.50"
            placeholder="EX: 1.70" title="Infome sua altura em metros"
            required>

            <button type="submit">Calcular o resultado</button>
            <button type="reset" class="limpar">Limpar</button>


        </form>
    </div>

    <div id="resultado">


    </div>
    
    <!--Carregando o JS-->
    <script src="js/script.js"></script>


    
</body>
</html>
